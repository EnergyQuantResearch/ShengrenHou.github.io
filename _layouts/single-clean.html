---
layout: default
---

{% include base_path %}

<div id="main" class="clean-main" role="main">
  <article class="page page--clean" itemscope itemtype="http://schema.org/CreativeWork">
    {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
    {% if page.excerpt %}<meta itemprop="description" content="{{ page.excerpt | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}

    <div class="page__inner-wrap page__inner-wrap--clean">
      <header class="page-heading page-heading--clean">
        <p class="page-heading__eyebrow">{{ site.author.name }}</p>
        {% if page.title %}<h1 class="page__title" itemprop="headline">{{ page.title | markdownify | remove: "<p>" | remove: "</p>" }}</h1>{% endif %}
      </header>

      <section class="page__content page__content--clean" itemprop="text">
        {{ content }}
      </section>
    </div>
  </article>
</div>
